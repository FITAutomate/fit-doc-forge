name: PIV feature request
about: Capture blueprint references and compliance checks for new work.
title: "[PIV] "
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: "Brief summary of the feature request."
      placeholder: "e.g. Phase 3 - build promote script"
      required: true
  - type: dropdown
    id: blueprint_phase
    attributes:
      label: Blueprint phase
      description: "Select the Phase referenced in FIT-Automate-Master-Blueprint-v3.md Part 10."
      options:
        - "Phase 1 - fit-docs-forge Repo"
        - "Phase 2 - Vault Foundation"
        - "Phase 3 - Promote Script"
        - "Phase 4 - Next.js Preview UI"
        - "Phase 5 - Airtable Bridge"
        - "Phase 5.5 - System Safety & Observability"
        - "Phase 6 - Agent Automation"
        - "Phase 7 - Folder Rewrite Command"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what this feature delivers.
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
  - type: input
    id: readme_schema_check
    attributes:
      label: README schema check
      description: Which README was read and what rules were applied?
  - type: textarea
    id: notes
    attributes:
      label: Notes
