repo: fit-docs-forge
repo_type: python-nextjs
description: AI documentation pipeline for FIT Automate (agent + preview UI).

blueprint: FIT-Automate-Master-Blueprint-v3.md

structure:
  agent: /agent
  app: /app

validation:
  python:
    install: "pip install -e \".[dev]\""
    lint: "ruff check ."
    test: "pytest"
    working_dir: agent
  nextjs:
    install: "npm ci"
    lint: "npm run lint"
    build: "npm run build"
    working_dir: app

agent_rules:
  readme_as_schema: true
  readme_overrides_yaml: true
  gate_fields_default: false
  no_invented_slas: true
  no_secrets: true

pr_discipline:
  max_concerns_per_pr: 1
  draft_first: true
  validation_evidence_required: true

docs_parity:
  changelog_required: true
  readme_required_when_phase_or_workflow_changes: true
  commands_required_when_cli_or_env_changes: true
  env_example_required_when_env_strategy_changes: true
  promote_rollback_audit_require_dual_doc_updates:
    - README.md
    - .ai/COMMANDS.md

airtable_policy:
  preferred_mapping: field_ids
  required_toggle: AIRTABLE_USE_FIELD_IDS=true
